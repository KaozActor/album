<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Álbum Privado</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8fbfd;
      color: #333;
    }
    header {
      background: #d6f4f8;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; font-size: 1.8em; }
    .container {
      padding: 15px;
      max-width: 1000px;
      margin: auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 5px 0;
    }
    button {
      background: #6ed3df;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #57c2ce; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .gallery-item {
      position: relative;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .gallery-item img, .gallery-item video {
      width: 100%;
      height: auto;
      display: block;
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff6b6b;
      border: none;
      color: white;
      padding: 6px 10px;
      font-size: 0.8em;
      border-radius: 6px;
      cursor: pointer;
    }
    .delete-btn:hover { background: #e85a5a; }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Meu Álbum Privado</h1>
  </header>

  <div class="container">
    <!-- Login -->
    <div id="login" class="card">
      <p>Digite a senha:</p>
      <input type="password" id="senha">
      <button onclick="entrar()">Entrar</button>
    </div>

    <!-- Álbum -->
    <div id="album" class="card" style="display:none;">
      <h2>Galeria</h2>
      <input type="file" id="fileInput" multiple>
      <button onclick="salvarArquivos()">Adicionar</button>
      <div class="gallery" id="galeria"></div>
      <div class="pagination">
        <button onclick="paginaAnterior()">Anterior</button>
        <span id="paginaInfo"></span>
        <button onclick="proximaPagina()">Próxima</button>
      </div>
    </div>
  </div>

  <script>
    const SENHA_CORRETA = "1234"; // troque pela sua senha
    const DB_NAME = "AlbumPrivado";
    let db;
    let paginaAtual = 1;
    const itensPorPagina = 20;

    // Inicializa IndexedDB
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = e => {
      db = e.target.result;
      db.createObjectStore("arquivos", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; };

    // Login
    function entrar() {
      const senha = document.getElementById("senha").value;
      if (senha === SENHA_CORRETA) {
        document.getElementById("login").style.display = "none";
        document.getElementById("album").style.display = "block";
        carregarArquivos();
      } else {
        alert("Senha incorreta!");
      }
    }

    // Salvar arquivos
    function salvarArquivos() {
      const files = document.getElementById("fileInput").files;
      const tx = db.transaction("arquivos", "readwrite");
      const store = tx.objectStore("arquivos");
      for (let file of files) {
        const reader = new FileReader();
        reader.onload = () => {
          store.add({ nome: file.name, tipo: file.type, dados: reader.result });
        };
        reader.readAsDataURL(file);
      }
      tx.oncomplete = () => { paginaAtual = 1; carregarArquivos(); };
    }

    // Carregar arquivos com paginação
    function carregarArquivos() {
      const galeria = document.getElementById("galeria");
      galeria.innerHTML = "";
      const tx = db.transaction("arquivos", "readonly");
      const store = tx.objectStore("arquivos");
      const req = store.getAll();
      req.onsuccess = () => {
        const arquivos = req.result;
        const totalPaginas = Math.ceil(arquivos.length / itensPorPagina) || 1;
        if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;
        const inicio = (paginaAtual - 1) * itensPorPagina;
        const fim = inicio + itensPorPagina;
        const pagina = arquivos.slice(inicio, fim);

        pagina.forEach(({id, tipo, dados}) => {
          const item = document.createElement("div");
          item.className = "gallery-item";
          let el;
          if (tipo.startsWith("image")) {
            el = document.createElement("img");
            el.src = dados;
          } else if (tipo.startsWith("video")) {
            el = document.createElement("video");
            el.src = dados;
            el.controls = true;
          }
          const delBtn = document.createElement("button");
          delBtn.textContent = "Excluir";
          delBtn.className = "delete-btn";
          delBtn.onclick = () => excluirArquivo(id);
          item.appendChild(el);
          item.appendChild(delBtn);
          galeria.appendChild(item);
        });

        document.getElementById("paginaInfo").textContent =
          `Página ${paginaAtual} de ${totalPaginas}`;
      };
    }

    function proximaPagina() { paginaAtual++; carregarArquivos(); }
    function paginaAnterior() { if (paginaAtual > 1) paginaAtual--; carregarArquivos(); }

    // Excluir arquivo
    function excluirArquivo(id) {
      const tx = db.transaction("arquivos", "readwrite");
      const store = tx.objectStore("arquivos");
      store.delete(id);
      tx.oncomplete = carregarArquivos;
    }
  </script>
</body>
</html>
